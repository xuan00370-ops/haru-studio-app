<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Khách hàng | Haru Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --primary: #f97316;
            --primary-light: #ffedd5;
            --primary-dark: #ea580c;
            --secondary: #3b82f6;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
        }

        /* Biến thành App Layout thực thụ cho Mobile */
        .app-container {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background: var(--bg);
        }

        header {
            background: var(--surface);
            padding: 24px 20px 20px;
            padding-top: env(safe-area-inset-top, 24px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-weight: 900;
            font-size: 1.25rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand::before {
            content: '✿';
            color: var(--primary);
            font-size: 1.1rem;
        }

        .client-greeting {
            margin-top: 12px;
            font-size: 0.95rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        .client-name {
            display: block;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1.2;
            margin-top: 4px;
        }

        .content {
            flex: 1;
            padding: 16px;
            padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .job-card {
            background: var(--surface);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .job-type {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text-main);
        }

        .job-date {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: 800;
            padding: 6px 12px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-done {
            background: #dcfce7;
            color: #166534;
        }

        .status-progress {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-waiting {
            background: #fef3c7;
            color: #92400e;
        }

        /* Deadlines UI */
        .deadlines-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .deadline-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 1px dashed var(--border);
        }

        .deadline-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
            margin-bottom: 0;
        }

        .deadline-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .deadline-date {
            font-size: 1rem;
            font-weight: 800;
            color: var(--primary-dark);
        }

        /* Info List */
        .info-list {
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.95rem;
        }

        .info-label {
            color: var(--text-dim);
        }

        .info-value {
            font-weight: 600;
            color: var(--text-main);
            text-align: right;
        }

        .finance-box {
            background: #fff1f2;
            border: 1px solid #fecdd3;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .finance-box .amount {
            font-weight: 800;
            color: var(--danger);
            font-size: 1.1rem;
        }

        .finance-box .label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #be123c;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .finance-box.cleared {
            background: #f0fdf4;
            border-color: #bbf7d0;
        }

        .finance-box.cleared .amount {
            color: var(--success);
        }

        .finance-box.cleared .label {
            color: #166534;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 1rem;
            text-align: center;
            text-decoration: none;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s;
            cursor: pointer;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            box-shadow: 0 4px 16px rgba(249, 115, 22, 0.25);
        }

        .btn-drive {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.25);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--text-dim);
        }

        .footer-support {
            text-align: center;
            padding: 30px 20px calc(env(safe-area-inset-bottom, 20px) + 30px);
            background: var(--surface);
            color: var(--text-dim);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
        }

        .loader {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .loader i {
            font-size: 32px;
            color: var(--primary);
            margin-bottom: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            background: var(--surface);
            border-radius: 24px;
            border: 1px dashed var(--border);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="brand">HARU STUDIO</div>
            <div class="client-greeting" id="greeting">Vui lòng đợi...</div>
        </header>

        <div class="content" id="content">
            <div class="loader">
                <i class="fas fa-circle-notch"></i><br>
                Đang chuẩn bị dữ liệu của bạn...
            </div>
        </div>

        <div class="footer-support">
            <i class="fas fa-heart" style="color: var(--danger); margin-right: 0.3rem"></i> Cảm ơn bạn đã tin tưởng Haru
            Studio<br>
            <div style="margin-top: 0.5rem">
                Hotline hỗ trợ: <strong id="support-phone" style="color: var(--text-main); font-size: 1rem;">1900
                    0000</strong>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const cid = urlParams.get('cid');
        const db = urlParams.get('db');

        function formatCurrency(val) {
            return new Intl.NumberFormat('vi-VN').format(val || 0) + 'đ';
        }

        async function loadData() {
            if (!cid) {
                showError('Đường dẫn không hợp lệ. Vui lòng kiểm tra lại link tra cứu!');
                return;
            }

            const urlData = urlParams.get('d');
            const urlName = urlParams.get('name');

            // 1. NGƯỜI DÙNG TRUY CẬP QUA LINK CHỨA SẴN DATA (HOẠT ĐỘNG 100% OFF-FIREBASE)
            if (urlData && urlName) {
                try {
                    const clientName = urlName;
                    const parsedArray = JSON.parse(urlData);
                    const jobsPayload = parsedArray.map(arr => ({
                        eventType: arr[0],
                        date: arr[1],
                        status: arr[2],
                        package: arr[3],
                        deposit: arr[4],
                        venue: arr[5],
                        services: arr[6] ? arr[6].split('|').map(s => ({ service: s })) : [],
                        linkCustomer: arr[7],
                        linkDrive: arr[8]
                    }));
                    jobsPayload.sort((a, b) => new Date(b.date) - new Date(a.date));
                    renderPortal({ name: clientName }, jobsPayload, null);
                    return; // Đã render xong
                } catch (e) {
                    console.warn("Lỗi giải mã URL Data, chuyển sang fetch DB.", e);
                }
            }

            // 2. FETCH QUA FIREBASE NHƯ CŨ LÀM FALLBACK
            let state = null;
            try {
                if (db) {
                    const res = await fetch(`https://${db}/haru_state.json`);
                    state = await res.json();
                } else {
                    const raw = localStorage.getItem('haru_state_v1');
                    if (raw) state = JSON.parse(raw);
                }

                if (!state || !state.jobs) {
                    throw new Error("Không có dữ liệu hệ thống.");
                }

                let clients = state.clients || [];
                if (clients.length === 0) {
                    const map = new Map();
                    state.jobs.forEach(j => {
                        if (!j.isTrash) {
                            const genId = 'CUST-' + btoa(encodeURIComponent(j.client)).replace(/=/g, '').substring(0, 12);
                            map.set(j.client, { id: genId, name: j.client });
                        }
                    });
                    clients = Array.from(map.values());
                }

                const client = clients.find(c => c.id === cid);
                if (!client) {
                    showError('Không tìm thấy thông tin Khách hàng này hoặc ID không hợp lệ.');
                    return;
                }

                const clientJobs = state.jobs.filter(j => j.client === client.name && !j.isTrash);
                clientJobs.sort((a, b) => new Date(b.date) - new Date(a.date));

                if (state.settings && state.settings.studioPhone) {
                    const sPhone = document.getElementById('support-phone');
                    if (sPhone) sPhone.innerText = state.settings.studioPhone;
                }

                renderPortal(client, clientJobs, state);

            } catch (err) {
                console.error(err);
                if (!urlData) {
                    showError('Đã xảy ra lỗi khi kết nối máy chủ.<br><span style="font-size:0.8rem;opacity:0.7">(' + err.message + ')</span>');
                }
            }
        }

        function showError(msg) {
            document.getElementById('greeting').innerText = 'Lỗi truy cập';
            document.getElementById('content').innerHTML = `
                <div style="text-align: center; padding: 2.5rem 1.5rem; background: #fff; border-radius: 20px; border: 1px solid #fecaca; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.1);">
                    <div style="width: 60px; height: 60px; background: #fee2e2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 1.8rem; color: #dc2626;"></i>
                    </div>
                    <p style="color: #991b1b; font-weight: 600; font-size: 1rem;">${msg}</p>
                </div>
            `;
        }

        function renderPortal(client, jobs, state) {
            document.getElementById('greeting').innerHTML = `Xin chào Khách hàng <span class="client-name">${client.name}</span>`;

            let html = `<div class="section-title"><i class="fas fa-layer-group"></i> Lịch sử Dự án (${jobs.length})</div>`;

            if (jobs.length === 0) {
                html += `
                    <div class="empty-state">
                        <i class="far fa-folder-open"></i>
                        <h3>Chưa có dự án nào</h3>
                        <p style="margin-top:0.5rem">Bạn chưa có dự án nào được khởi tạo trên hệ thống.</p>
                    </div>
                `;
            }

            jobs.forEach(job => {
                // Determine Status
                let statusClass = 'status-waiting';
                let statusIcon = 'fa-clock';
                if (job.status === 'Đã hoàn thành') {
                    statusClass = 'status-done';
                    statusIcon = 'fa-check-circle';
                } else if (job.status === 'Đang edit' || job.status === 'Nhận Feedback') {
                    statusClass = 'status-progress';
                    statusIcon = 'fa-spinner fa-spin';
                }

                // Financials
                const debt = (job.package || 0) - (job.deposit || 0);

                // Deadlines
                const jobDate = new Date(job.date);

                const photoDate = new Date(jobDate);
                photoDate.setDate(photoDate.getDate() + 15);
                const expectedPhoto = photoDate.toLocaleDateString('vi-VN');

                const videoDate = new Date(jobDate);
                videoDate.setDate(videoDate.getDate() + 30);
                const expectedVideo = videoDate.toLocaleDateString('vi-VN');

                // Check service types to only show relevant deadlines
                const hasPhoto = job.services && job.services.some(s => s.service.toLowerCase().includes('chụp') || s.service.toLowerCase().includes('photo'));
                const hasVideo = job.services && job.services.some(s => s.service.toLowerCase().includes('quay') || s.service.toLowerCase().includes('video'));

                // If it's old data without services array, show both by default
                const showBoth = !job.services || job.services.length === 0 || (!hasPhoto && !hasVideo);

                html += `
                    <div class="job-card">
                        <div class="job-header">
                            <div>
                                <div class="job-type">${job.eventType || 'Gói Dịch Vụ Studio'}</div>
                                <div class="job-date"><i class="far fa-calendar-alt"></i> ${new Date(job.date).toLocaleDateString('vi-VN')}</div>
                            </div>
                            <div class="status-badge ${statusClass}">
                                <i class="fas ${statusIcon}"></i> ${job.status}
                            </div>
                        </div>
                        
                        <div class="deadlines-box">
                            ${(hasPhoto || showBoth) ? `
                            <div class="deadline-item">
                                <span class="deadline-label"><i class="fas fa-camera"></i> Trả Ảnh</span>
                                <span class="deadline-date">${expectedPhoto}</span>
                            </div>
                            ` : ''}
                            
                            ${(hasVideo || showBoth) ? `
                            <div class="deadline-item">
                                <span class="deadline-label"><i class="fas fa-video"></i> Trả Video</span>
                                <span class="deadline-date">${expectedVideo}</span>
                            </div>
                            ` : ''}
                        </div>
                        
                        <div class="info-list">
                            <div class="info-row">
                                <span class="info-label">Địa điểm chụp:</span>
                                <span class="info-value"><i class="fas fa-map-marker-alt" style="color:var(--danger); margin-right:4px"></i> ${job.venue || 'Chưa cập nhật'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Tổng chi phí:</span>
                                <span class="info-value">${formatCurrency(job.package)}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Đã thanh toán:</span>
                                <span class="info-value" style="color: var(--success)">${formatCurrency(job.deposit)}</span>
                            </div>
                        </div>

                        ${debt > 0 ? `
                            <div class="finance-box">
                                <span class="label"><i class="fas fa-money-bill-wave"></i> Còn nợ</span>
                                <span class="amount">${formatCurrency(debt)}</span>
                            </div>
                        ` : `
                            <div class="finance-box cleared">
                                <span class="label"><i class="fas fa-check-circle"></i> Đã thanh toán đủ</span>
                                <span class="amount">0đ</span>
                            </div>
                        `}

                        <div class="btn-group" style="margin-top: 1.5rem">
                            ${job.linkDrive ? `
                                <a href="${job.linkDrive}" target="_blank" class="btn btn-drive">
                                    <i class="fab fa-google-drive"></i> TRUY CẬP GOOGLE DRIVE
                                </a>
                            ` : ''}
                            
                            ${job.linkCustomer ? `
                                <a href="${job.linkCustomer}" target="_blank" class="btn btn-primary">
                                    <i class="fas fa-cloud-download-alt"></i> LINK TẢI SẢN PHẨM KHÁC
                                </a>
                            ` : `
                                ${!job.linkDrive ? `
                                <div class="btn btn-secondary" style="opacity: 0.7; cursor: not-allowed;">
                                    <i class="fas fa-hourglass-half"></i> Đang trong quá trình hậu kỳ...
                                </div>
                                ` : ''}
                            `}
                        </div>
                    </div>
                `;
            });

            document.getElementById('content').innerHTML = html;
        }

        // Init
        loadData();
    </script>
</body>

</html>
