server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /portal {
    try_files /portal.html =404;
  }

  location = / {
    try_files /index.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
